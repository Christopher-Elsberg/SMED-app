nt-size:12px;margin-bottom:5px}.compact-kpi .value{font-size:clamp(20px,2.5vw,28px);font-variant-numeric:tabular-nums;overflow-wrap:anywhere}.table-scroll{overflow-x:auto;overflow-y:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:14px;max-width:100%}.professional-table{font-size:12.5px;min-width:900px}.manual-layout{display:grid;grid-template-columns:minmax(240px,.62fr) minmax(0,1.38fr);gap:18px;min-width:0}.manual-index{position:sticky;top:20px}.manual-index a{display:block;color:#334155;text-decoration:none;padding:9px 10px;border-radius:10px;font-size:13px;overflow-wrap:anywhere}.manual-block,.process-phase{border:1px solid var(--line);border-radius:16px;background:#fff;padding:16px;margin-bottom:14px;min-width:0}.process-phase{display:grid;grid-template-columns:42px 1fr;gap:12px}.phase-icon{width:36px;height:36px;border-radius:999px;background:#e2e8f0;color:#1f2937;display:flex;align-items:center;justify-content:center;font-weight:700;flex:0 0 auto}.note,.file-note{font-size:12px;color:#64748b;line-height:1.45;overflow-wrap:anywhere}.note{border-left:4px solid #334155;padding:12px 14px;background:#f8fafc;border-radius:10px;font-size:13px}.lock-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:clamp(16px,3vw,28px);background:#0f172a}.lock-card{width:min(460px,100%);background:#fff;border-radius:22px;padding:clamp(18px,2vw,28px);box-shadow:0 24px 70px rgba(0,0,0,.25);border:1px solid var(--line)}.lock-card h1{margin:0 0 8px;color:#111827}.lock-error{color:#991b1b;font-size:13px;margin-top:10px;min-height:18px}.language-switch{position:fixed;left:14px;bottom:14px;z-index:1000;display:flex;gap:8px;background:rgba(255,255,255,.95);border:1px solid #cbd5e1;border-radius:999px;padding:7px;box-shadow:0 10px 30px rgba(15,23,42,.15);max-width:calc(100vw - 28px);flex-wrap:wrap}.language-switch button{border:0;background:#f1f5f9;border-radius:999px;padding:8px 10px;cursor:pointer;font-size:13px}.language-switch button.active-lang{background:#1f2937;color:#fff}.video-shell{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(320px,.95fr);gap:18px;min-width:0}.video-box{background:#0f172a;border-radius:18px;padding:14px;min-height:clamp(220px,36vw,360px);display:flex;align-items:center;justify-content:center}video{width:100%;height:auto;max-height:70vh;border-radius:12px;background:#000}.timestamp{font-variant-numeric:tabular-nums;font-size:clamp(18px,3vw,24px)}.timer-display{background:#0f172a;color:#fff;border-radius:18px;padding:28px 20px;display:flex;align-items:center;justify-content:center;flex-direction:column;min-height:clamp(130px,22vw,180px);margin-bottom:16px}.timer-display .time{font-size:clamp(34px,7vw,54px);font-variant-numeric:tabular-nums;line-height:1}.timer-display .caption{color:#cbd5e1;margin-top:8px;font-size:13px;text-align:center}.setup-manager{display:grid;grid-template-columns:minmax(240px,.7fr) minmax(0,1fr);gap:18px;min-width:0}.setup-item-row,.setup-item{padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:#fff;margin-bottom:8px}.setup-item-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}.setup-item-row button{padding:7px 10px;border-radius:10px;border:0;background:#fee2e2;color:#991b1b;cursor:pointer}.checklist{display:grid;gap:9px}.checklist label{display:flex;gap:10px;font-size:14px;color:var(--text)}.checklist input{width:auto}@media(max-width:1400px){.grid-5{grid-template-columns:repeat(3,minmax(0,1fr))}.grid-4{grid-template-columns:repeat(2,minmax(0,1fr))}.manual-layout{grid-template-columns:minmax(220px,.72fr) minmax(0,1.28fr)}.video-shell{grid-template-columns:minmax(0,1fr) minmax(300px,.9fr)}}@media(max-width:1180px){.app{grid-template-columns:1fr}aside{height:auto;position:relative;top:auto}.manual-index{position:relative;top:auto}.video-shell,.manual-layout,.setup-manager{grid-template-columns:1fr}.grid-5{grid-template-columns:repeat(2,minmax(0,1fr))}.grid-4,.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}.professional-table{min-width:820px}}@media(max-width:820px){main{padding:16px}.topbar{flex-direction:column;align-items:stretch}.grid-5,.grid-4,.grid-2,.dashboard-kpis,.video-shell,.manual-layout,.setup-manager{grid-template-columns:1fr}.button-row{flex-direction:column;align-items:stretch}.button-row button{width:100%}.online-item{grid-template-columns:1fr}.online-item .actions{justify-content:stretch}.online-item .actions button{width:100%}.sop-preview-dialog{width:min(100%,100%);height:min(94vh,100%)}.app-modal-card{width:min(100%,100%)}.language-switch{left:10px;right:10px;bottom:10px;justify-content:center}.professional-table{min-width:760px}table,.professional-table{font-size:12px}th,td{padding:8px 7px}}@media(max-width:560px){h1{font-size:24px}.card{padding:14px}.form-grid{grid-template-columns:1fr}.grid-2,.grid-4,.grid-5,.dashboard-kpis{grid-template-columns:1fr}.process-phase{grid-template-columns:1fr}.phase-icon{margin-bottom:6px}.timer-display{padding:18px 14px}.language-switch button{flex:1 1 auto}.badge{width:fit-content}.professional-table{min-width:680px}table,.professional-table{font-size:11.5px}}@media print{aside,.button-row,.topbar .badge,.language-switch,input,select,textarea{display:none!important}.app{display:block}main{padding:0}.section{display:none}.section.active{display:block}.card{box-shadow:none;border:1px solid #ccc;page-break-inside:avoid}body{background:#fff}}

/* --- Owner autocomplete dropdown --- */
.owner-autocomplete{position:relative}
#owner-suggest,#sop-approver-suggest{position:absolute;left:0;right:0;top:calc(100% + 6px);background:#fff;border:1px solid #d1d5db;border-radius:12px;box-shadow:0 10px 30px rgba(15,23,42,.12);max-height:220px;overflow:auto;z-index:9999;display:none}
#owner-suggest button,#sop-approver-suggest button{width:100%;text-align:left;background:transparent;border:0;padding:10px 12px;font-size:14px;cursor:pointer;color:#111827}
#owner-suggest button:hover,#sop-approver-suggest button:hover{background:#f1f5f9}
#owner-suggest .mutedline,#sop-approver-suggest .mutedline{padding:10px 12px;color:#64748b;font-size:12px}

/* --- Online archive list --- */
.online-item{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:12px 12px;border:1px solid var(--line);border-radius:14px;background:#fff;margin-bottom:10px}
.online-item .meta{color:var(--muted);font-size:12px;margin-top:4px;line-height:1.35}
.online-item .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.online-item .actions button{padding:8px 10px;border-radius:10px}


/* --- SOP preview modal fallback --- */
.sop-preview-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;z-index:10001;padding:18px}
.sop-preview-overlay.open{display:flex}
.sop-preview-dialog{width:min(1200px,100%);height:min(92vh,100%);background:#fff;border-radius:18px;box-shadow:0 24px 70px rgba(0,0,0,.28);display:grid;grid-template-rows:auto 1fr;overflow:hidden;border:1px solid #cbd5e1}
.sop-preview-topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid #e5e7eb;background:#f8fafc}
.sop-preview-title{font-size:15px;font-weight:700;color:#1f2937}
.sop-preview-frame{width:100%;height:100%;border:0;background:#fff}

/* --- All approvals streamlined action cell --- */
.approval-actions-cell{white-space:nowrap}
.approval-actions-bar{display:flex;align-items:center;gap:6px;flex-wrap:nowrap}
.approval-actions-bar button{padding:6px 8px!important;border-radius:10px;font-size:12px;line-height:1.2}
.approval-table-note{margin:8px 0 0 0}

/* --- Reusable app modal (non-browser popup) --- */
.app-modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;z-index:10020;padding:18px}
.app-modal-overlay.open{display:flex}
.app-modal-card{width:min(520px,100%);background:#fff;border-radius:18px;box-shadow:0 24px 70px rgba(0,0,0,.28);border:1px solid #cbd5e1;overflow:hidden}
.app-modal-topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid #e5e7eb;background:#f8fafc}
.app-modal-title{font-size:16px;font-weight:700;color:#1f2937}
.app-modal-body{padding:16px}
.app-modal-body p{margin:0 0 12px 0;line-height:1.5;color:#334155}
.app-modal-body label{margin-top:10px}
.app-modal-body input,.app-modal-body textarea{margin-top:6px}
.app-modal-actions{display:flex;justify-content:flex-end;gap:10px;padding:0 16px 16px 16px;flex-wrap:wrap}


.live-form-grid{min-width:0}
.admin-filter-grid{min-width:0}
#results .card h2,#sop .card h2,#archive .card h2,#dashboard .card h2{overflow-wrap:anywhere}
#analysis-summary-table th,#results-summary-table th{width:clamp(140px,24vw,220px)}
#recent-steps-table,#actions-table,#results-actions-table{word-break:break-word}
@media(max-width:820px){
  .admin-filter-grid{grid-template-columns:1fr 1fr!important}
  .live-form-grid{grid-template-columns:1fr 1fr!important}
  .sop-preview-topbar,.app-modal-topbar{flex-wrap:wrap}
}
@media(max-width:560px){
  .admin-filter-grid{grid-template-columns:1fr!important}
  .live-form-grid{grid-template-columns:1fr!important}
  #approval-history-modal .sop-preview-dialog{height:min(94vh,100%);width:min(100%,100%)}
}
/* --- Recent steps list--- */
.recent-steps-scroll {
  max-height: 220px;
  overflow-y: auto;
  overflow-x: auto;
  margin-top: 12px;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
}

.recent-steps-scroll table {
  width: 100%;
  border-collapse: collapse;
}

.recent-steps-scroll thead th {
  position: sticky;
  top: 0;
  background: #ffffff;
  z-index: 2;
}

/* --- AI review panel --- */
.ai-review-list{display:grid;gap:10px;margin-top:12px}
.ai-review-empty{padding:12px;border:1px dashed #cbd5e1;border-radius:12px;background:#fff;color:#64748b;font-size:13px}
.ai-review-card{border:1px solid #e5e7eb;border-radius:12px;padding:12px;background:#fff}
.ai-review-title{font-weight:700;margin-bottom:6px;color:#111827}
.ai-review-meta{display:grid;gap:4px;font-size:13px;color:#334155;margin-bottom:10px}
.ai-review-actions{display:flex;gap:8px;flex-wrap:wrap}
.ai-review-status{margin-top:8px}

</style>
</head>

<div class="language-switch"><button id="btn-da" onclick="applyLanguage('da')">🇩🇰 Dansk</button><button id="btn-en" onclick="applyLanguage('en')">🇬🇧 English</button><button id="btn-pl" onclick="applyLanguage('pl')">🇵🇱 Polski</button></div>
<div id="resume-modal" class="lock-screen hidden-app"><div class="lock-card"><h1 data-i18n="resumeDraftTitle"></h1><p class="muted" data-i18n="resumeDraftText"></p><div class="button-row"><button class="primary" onclick="continueLocalDraft()" data-i18n="btnContinueLocalDraft"></button><button class="secondary" onclick="startFreshFromPrompt()" data-i18n="btnStartNewDraft"></button></div><div class="file-note" style="margin-top:12px" data-i18n="resumeDraftNote"></div></div></div><div id="lock-screen" class="lock-screen"><div class="lock-card"><h1 data-i18n="loginTitle"></h1><p class="muted" data-i18n="loginSubtitle"></p><label data-i18n="username"></label><input id="login-username" autocomplete="off"><label data-i18n="password"></label><input id="login-password" type="password" autocomplete="off" onkeydown="if(event.key==='Enter')login()"><div class="button-row"><button class="primary" onclick="login()" data-i18n="loginButton"></button></div><div id="lock-error" class="lock-error"></div></div></div>

// --- Thin frontend helper: call Supabase Edge Function (smooth-task) ---
async function callApi(action, payload = {}){  
  if(!window.supabase) throw new Error('Supabase client mangler');  
  const { data: u, error: uErr } = await window.supabase.auth.getUser();  
  if(uErr) throw uErr;  
  if(!u?.user) throw new Error('Du er ikke logget ind');  
  const { data, error } = await window.supabase.functions.invoke('smooth-task', {  
    body: { action, payload }  
  });  
  if(error){
    try{
      const details = error?.context?.json ? await error.context.json() : null;
      if(details?.error) throw new Error(details.error);
    }catch(inner){
      if(inner?.message) throw inner;
    }
    throw new Error(error.message || 'Edge Function returned a non-2xx status code');
  }
  if(data && data.error) throw new Error(data.error);  
  return data;  
}


function normalizeSetupListItems(items){
  const setup = defaultSetup();
  (items || []).forEach(row=>{
    const key = row.list_name;
    if(!setup[key]) setup[key] = [];
    if(row.active !== false && row.value && !setup[key].includes(row.value)) setup[key].push(row.value);
  });
  Object.keys(setup).forEach(k=>{ if(!Array.isArray(setup[k])) setup[k]=[]; });
  return setup;
}

async function loadOnlineSetup(saveToLocal=true){
  try{
    const res = await callApi('setup.list', {});
    state.setup = normalizeSetupListItems(res?.items || []);
    state.setupLoadedOnline = true;
    if(saveToLocal) saveCurrentState();
    return true;
  }catch(e){
    console.warn('Kunne ikke hente online setup', e);
    state.setupLoadedOnline = false;
    ensureSetup();
    return false;
  }
}

async function saveAnalysisOnline(){
  const a = state.analysis || {};
  if(!a.id) return false;
  await callApi('analyses.create_or_update', {
    id: String(a.id || ''),
    name: String(a.name || ''),
    site: String(a.site || ''),
    line: String(a.line || ''),
    product: String(a.product || ''),
    analysis_date: String(a.date || ''),
    changeover_type: String(a.type || ''),
    registered_by_display_name: String(a.registeredBy || state.currentUserDisplayName || ''),
    video_ref: String(a.video || ''),
    status: String(a.status || ''),
    target_reduction: Number(a.targetReduction || 0),
    comment: String(a.comment || '')
  });
  return true;
}

async function syncStepsOnline(){
  if(!state?.analysis?.id) return false;
  const steps = (state.steps || []).map((s, idx)=>({
    seq_no: idx + 1,
    name: String(s.name || ''),
    start_sec: Number(s.start || 0),
    end_sec: Number(s.end || 0),
    duration_sec: Number(s.duration || 0),
    smed_type: String(s.smedType || ''),
    activity_type: String(s.activityType || ''),
    waste_type: String(s.wasteType || ''),
    comment: String(s.comment || '')
  }));
  await callApi('steps.replace_for_analysis', {
    analysis_id: String(state.analysis.id),
    steps
  });
  return true;
}

async function loadAnalysisFromOnline(analysisId){
  const [aRes, sRes] = await Promise.all([
    callApi('analyses.get', { id: analysisId }),
    callApi('steps.list_for_analysis', { analysis_id: analysisId })
  ]);
  const a = aRes?.analysis;
  if(!a) throw new Error('Analyse ikke fundet');
  state.analysis = {
    id: a.id,
    name: a.name || '',
    site: a.site || 'Vadum',
    line: a.line || 'Linje 1',
    product: a.product || '',
    date: a.analysis_date || new Date().toISOString().slice(0,10),
    type: a.changeover_type || 'Produktomstilling',
    registeredBy: a.registered_by_display_name || '',
    video: a.video_ref || '',
    status: a.status || 'Åben',
    targetReduction: Number(a.target_reduction || 0),
    comment: a.comment || ''
  };
  state.steps = (sRes?.steps || []).map(r => ({
    name: r.name,
    start: Number(r.start_sec || 0),
    end: Number(r.end_sec || 0),
    duration: Number(r.duration_sec || 0),
    smedType: r.smed_type,
    activityType: r.activity_type || '',
    wasteType: r.waste_type || '',
    comment: r.comment || ''
  }));
  saveCurrentState();
  render();
  applyRoleAccess();
  return true;
}

function handleSiteChange(){
  try{
    const siteSel=document.getElementById('site');
    const lineSel=document.getElementById('line');
    if(!siteSel || !lineSel) return;

    // Opdatér state
    state.analysis.site = siteSel.value;

    // Opdatér linje-listen og vælg en gyldig linje
    const lines = getLinesForSite(state.analysis.site);
    populateSelect('line', lines, lineSel.value);

    if(!lines.includes(lineSel.value)){
      lineSel.value = lines[0] || '';
      state.analysis.line = lineSel.value;
    } else {
      state.analysis.line = lineSel.value;
    }

    saveCurrentState();
    // Render uden at overskrive inputfelter unødigt
    render(false);
  }catch(e){
    console.warn(e);
  }
}

  const profile = p.data.profile;
  if(!profile) {
    await window.forceSignOut?.();

  }

  }

  }catch(e){

}

function setSectionControlsDisabled(sectionId, disabled){
  const root = document.getElementById(sectionId);
  if(!root) return;
  root.querySelectorAll('input, select, textarea, button').forEach(el=>{
    if(el.closest('.nav')) return;
    if(el.id==='import-file') return;
    if(el.id==='video-file') return;
    if(el.matches('[data-role-keep]')) return;
    el.disabled = !!disabled;
  });
}

async function loadActionsForCurrentAnalysis(){
  if(!state?.analysis?.id) return [];
  try{
    await ensureProfilesLoaded();
    const rows = [];
    const mineRes = await callApi('actions.my_list', {});
    (mineRes?.actions || []).forEach(a=>rows.push(a));
    if(isAdminRole()){
      const allRes = await callApi('actions.admin_all', {});
      (allRes?.actions || []).forEach(a=>rows.push(a));
    }

    const filtered = rows.filter(a => {
      const aid = String(a.analysis_id || '');
      if(aid !== String(state.analysis.id || '')) return false;
      const id = String(a.id || '');
      if(id && seen.has(id)) return false;
      if(id) seen.add(id);
      return true;
    });
    state.actions = filtered.map(a => ({

      title: a.title || '',
      owner: displayNameFromId(a.owner || ''),

async function addStep(){ if(!canUseLive()){ await openInfoModal('Kun admin og editor må registrere live-trin.', 'Adgang'); return; } 
  const v=document.getElementById('analysis-video');
  const hasVideo=!!(v && v.src);

  // End time is the current video time
  const end = hasVideo ? Math.round(v.currentTime||0) : null;

  // Start time is 00:00 for first step, otherwise previous end
  const start = state.steps.length ? Number(state.steps[state.steps.length-1].end||0) : 0;

  // Timer mode (no video) uses timerSeconds as duration
  const duration = hasVideo ? (end - start) : Math.max(Number(state.timerSeconds||0),1);
  const calcEnd = hasVideo ? end : (start + duration);

  if(calcEnd <= start){
    await openInfoModal(t('stepTimeBackwards'), 'Validering');
    return;
  }

  const old=document.getElementById('step-comment').value;
  const comment = hasVideo ? `${t('videoTime',{time:formatTime(end)})}${old?' - '+old:''}` : old;

  state.steps.push({
    name: document.getElementById('step-name').value || t('unnamedActivity'),
    start: start,
    end: calcEnd,
    duration: (calcEnd-start),
    smedType: document.getElementById('smed-type').value,
    activityType: document.getElementById('activity-type').value,
    wasteType: document.getElementById('waste-type').value,
    comment: comment
  });

  document.getElementById('step-name').value='';
  document.getElementById('step-comment').value='';

  if(!hasVideo) resetTimer();

  saveCurrentState();
  try{ syncStepsOnline(); }catch(e){ console.warn(e); }
  render();
}

let videoTimerRaf=null;

function runVideoTimerLoop(){let v=document.getElementById('analysis-video');if(!v||!v.src||v.paused||v.ended){stopVideoTimerLoop();return}updateVideoTimeDisplay();videoTimerRaf=requestAnimationFrame(runVideoTimerLoop)}
function startVideoTimerLoop(){stopVideoTimerLoop();runVideoTimerLoop()}
function startTimer(){let v=document.getElementById('analysis-video');if(v&&v.src){v.play();state.timerRunning=true;startVideoTimerLoop();updateVideoTimeDisplay();return}if(state.timerRunning)return;state.timerRunning=true;state.interval=setInterval(()=>{state.timerSeconds++;document.getElementById('timer').textContent=formatTime(state.timerSeconds)},1000)}
function pauseTimer(){let v=document.getElementById('analysis-video');if(v&&v.src){v.pause();state.timerSeconds=Math.round(v.currentTime||0);stopVideoTimerLoop();updateVideoTimeDisplay()}state.timerRunning=false;if(state.interval)clearInterval(state.interval);state.interval=null}

function loadLocalVideo(e){
  let f=e.target.files[0];
  if(!f) return;
  let v=document.getElementById('analysis-video');
  if(!v) return;
  setVideoStatus(t('videoLoading',{name:f.name}));
  stopVideoTimerLoop();
  if(v.dataset.objectUrl){
    try{ URL.revokeObjectURL(v.dataset.objectUrl); }catch{}
  }
  const mime=(f.type&&f.type.trim())?f.type:'video/mp4';
  if(v.canPlayType&&v.canPlayType(mime)==='') setVideoStatus(t('videoMayNotPlay'),true);
  let url=URL.createObjectURL(f);
  v.dataset.objectUrl=url;
  v.src=url;
  v.load();
  try{ v.currentTime=0; }catch{}
  state.timerSeconds=0;
  updateVideoTimeDisplay();
  const onMeta=()=>{ setVideoStatus(t('videoLoaded',{name:f.name})); v.removeEventListener('loadedmetadata', onMeta); };
  v.addEventListener('loadedmetadata', onMeta);
  const onErr=()=>{ setVideoStatus(t('videoLoadFailed'), true); };
  v.addEventListener('error', onErr, {once:true});
}
function updateVideoTimeDisplay(){let v=document.getElementById('analysis-video'),cur=v?v.currentTime||0:0;state.timerSeconds=Math.round(cur);document.getElementById('video-current-time').textContent=formatTime(cur);if(v&&v.src)document.getElementById('timer').textContent=formatTime(cur)}
function seekVideo(s){let v=document.getElementById('analysis-video');if(!v||isNaN(v.duration))return;v.currentTime=Math.max(0,Math.min(v.duration,v.currentTime+s));updateVideoTimeDisplay()}
function toggleVideoPlayback(){let v=document.getElementById('analysis-video');if(!v||!v.src)return;if(v.paused){v.play();state.timerRunning=true;startVideoTimerLoop()}else{v.pause();state.timerRunning=false;stopVideoTimerLoop()}updateVideoTimeDisplay()}

async function addVideoObservationAsStep(){
  const v=document.getElementById('analysis-video');
  const hasVideo=!!(v && v.src);

  if(!hasVideo){
    document.getElementById('step-name').value = document.getElementById('video-observation').value || t('videoObservationDefault');
    return addStep();
  }

  const end = Math.round(v.currentTime||0);
  const start = state.steps.length ? Number(state.steps[state.steps.length-1].end||0) : 0;
  if(end <= start){
    await openInfoModal(t('stepTimeBackwards'), 'Validering');
    return;
  }

  const obs = document.getElementById('video-observation').value || t('videoObservationDefault');
  const old = document.getElementById('step-comment').value;
  const comment = `${t('registeredFromVideo',{time:formatTime(end)})}${old?' - '+old:''}`;

  state.steps.push({
    name: obs,
    start: start,
    end: end,
    duration: (end-start),
    smedType: document.getElementById('smed-type').value || 'Spild/ventetid',
    activityType: document.getElementById('activity-type').value || 'Ventetid',
    wasteType: document.getElementById('waste-type').value || 'Uklar standard',
    comment: comment
  });

  document.getElementById('video-observation').value='';
  document.getElementById('step-name').value='';
  document.getElementById('step-comment').value='';

  document.getElementById('last-video-stamp').textContent=t('addedAsStepAt',{time:formatTime(end)});

  saveCurrentState();
  try{ syncStepsOnline(); }catch(e){ console.warn(e); }
  render();
}

function renderMyActions(){

async function updateMyActionStatus(actionId){
  const errEl = document.getElementById('my-actions-error');
  if(errEl) errEl.textContent='';

  try{
    const sel = document.getElementById('my-status-'+actionId);
    const newStatus = sel ? sel.value : null;
    if(!newStatus) return;

    const hit = (state.myActions||[]).find(x=>x.id===actionId);

    let payload = { id: actionId, status: newStatus };

    if(newStatus === 'Lukket'){
      const result = await openCloseActionModal(
        hit?.actual_saving ?? '',
        hit?.completion_note ?? ''
      );

      if(!result) return;

      const actualSaving = parseFloat(String(result.actual).replace(',', '.'));
      if(!Number.isFinite(actualSaving) || actualSaving < 0){
        await openInfoModal('Du skal angive en gyldig besparelse', 'Validering');
        return;
      }

      payload.actual_saving = actualSaving;
      payload.completion_note = result.note || '';
    }

    const res = await callApi('actions.update_status', payload);

    if(hit){
      hit.status = newStatus;
      if(newStatus === 'Lukket'){
        hit.actual_saving = payload.actual_saving;
        hit.completion_note = payload.completion_note;
      }
    }

    const localHit = (state.actions||[]).find(x=>x.id===actionId);
    if(localHit){
      localHit.status = newStatus;
      if(newStatus === 'Lukket'){
        localHit.actual_saving = payload.actual_saving;
        localHit.completion_note = payload.completion_note;
      }
    }

    saveCurrentState();
    invalidateSectionLoad('my-actions');
    invalidateSectionLoad('all-actions');
    invalidateSectionLoad('dashboard');
    await loadActionsForCurrentAnalysis();
    renderMyActions();
    renderResults();
    renderActions();
    renderSopLogTables();

    if(isAdminRole()) loadDashboardStats();

  }catch(e){
    const msg = (e?.message || String(e));
    if(errEl) errEl.textContent = 'Kunne ikke opdatere status: ' + msg;
    await openInfoModal('Kunne ikke opdatere status: ' + msg, 'Fejl');
  }
}

function closeAppModal(result){
  const modal=document.getElementById('app-modal');
  if(modal) modal.classList.remove('open');
  const body=document.getElementById('app-modal-body');
  const actions=document.getElementById('app-modal-actions');
  if(body) body.innerHTML='';
  if(actions) actions.innerHTML='';
  const resolver=appModalResolver;
  appModalResolver=null;
  if(typeof resolver==='function') resolver(result);
}
function openAppModal(config={}){
  return new Promise(resolve=>{
    appModalResolver = resolve;
    const modal=document.getElementById('app-modal');
    const title=document.getElementById('app-modal-title');
    const body=document.getElementById('app-modal-body');
    const actions=document.getElementById('app-modal-actions');
    if(title) title.textContent=config.title||'Dialog';
    if(body) body.innerHTML=config.bodyHtml||'';
    if(actions){
      actions.innerHTML='';
      (config.buttons||[]).forEach(btn=>{
        const b=document.createElement('button');
        b.type='button';
        b.className=btn.className||'secondary';
        b.textContent=btn.label||'OK';
        b.onclick=()=>{
          const result=typeof btn.getResult==='function' ? btn.getResult() : (btn.value!==undefined ? btn.value : true);
          closeAppModal(result);
        };
        actions.appendChild(b);
      });
    }
    setAppModalTexts();
    modal?.classList.add('open');
  });
}

function getApprovalVersion(a){
  const raw = a?.sop_version ?? a?.version ?? a?.sop_snapshot_json?.sop?.version;
  const v = Number(raw);
  return Number.isFinite(v) ? v : 0;
}
function getApprovalSortDate(a){
  return String(a?.sop_updated_at || a?.requested_at || a?.created_at || a?.decided_at || '');
}
function getLatestApprovalPerAnalysis(rows){
  const byAnalysis = new Map();
  (rows || []).forEach(row => {
    const analysisId = String(row?.analysis_id || '');
    if(!analysisId) return;
    const current = byAnalysis.get(analysisId);
    if(!current){ byAnalysis.set(analysisId, row); return; }
    const rowVersion = getApprovalVersion(row);
    const currentVersion = getApprovalVersion(current);
    if(rowVersion > currentVersion){ byAnalysis.set(analysisId, row); return; }
    if(rowVersion === currentVersion && getApprovalSortDate(row) > getApprovalSortDate(current)) byAnalysis.set(analysisId, row);
  });
  return [...byAnalysis.values()];
}
function getOlderApprovalVersions(analysisId){
  const all = (state.allApprovals || []).filter(a => String(a.analysis_id || '') === String(analysisId || ''));
  const latestRows = getLatestApprovalPerAnalysis(all);
  const latestId = String(latestRows?.[0]?.id || '');
  return all.filter(a => String(a.id || '') !== latestId).sort((a,b) => {
    const dv = getApprovalVersion(b) - getApprovalVersion(a);
    if(dv !== 0) return dv;
    return getApprovalSortDate(b).localeCompare(getApprovalSortDate(a));
  });
}

async function sendSopForApproval(){
  if(!canEditAnalysis()){ await openInfoModal('Kun admin og editor må sende SOP til godkendelse.', 'Adgang'); return; }
  if(!hasAnalysisContext()){ await openInfoModal(t('analysisRequiredShort'), 'Mangler analyse'); return; }
  try{
    await ensureProfilesLoaded(true);
    const approverName = (document.getElementById('sop-approver').value || '').trim();
    const approverIdRaw = (document.getElementById('sop-approver-id').value || '').trim();
    const approverId = approverIdRaw || state.profilesCache?.nameToId?.[approverName] || state.profilesCache?.lowerNameToId?.[approverName.toLowerCase()] || '';
    if(!approverName || !approverId){
      await openInfoModal(t('approvalChooseApprover'), 'Vælg godkender');
      document.getElementById('sop-approver').focus();
      return;
    }
    await saveAnalysis();
    renderSop();
    const requestComment = await openTextPromptModal('Send til godkendelse', t('approvalRequestPrompt'), '');
    if(requestComment === null) return;
    const sopSnapshotHtml = buildSopApprovalSnapshotHtml();
    const sopSnapshotJson = buildSopApprovalSnapshotJson();
    await callApi('sop_approvals.create', {
      analysis_id: String(state.analysis?.id || ''),
      approver_id: String(approverId),
      request_comment: String(requestComment || ''),
      sop_snapshot_html: sopSnapshotHtml,
      sop_snapshot_json: sopSnapshotJson
    });
    invalidateSectionLoad('my-approvals');
    invalidateSectionLoad('all-approvals');
    await openInfoModal(t('approvalRequestSent'), 'Godkendelse');
    if(currentSectionId==='my-approvals') refreshMyApprovals();
  }catch(e){
    await openInfoModal(t('approvalRequestFailed', { err: e?.message || String(e) }), 'Fejl');
  }
}

  const errEl = document.getElementById('my-approvals-error');

  try{
    await ensureProfilesLoaded();
    const res = await callApi('sop_approvals.my_list', {});
    state.myApprovals = (res?.approvals || []).map(a => ({ ...a, sop_version: a?.sop_version ?? a?.sop_snapshot_json?.sop?.version ?? 0, sop_updated_at: a?.sop_updated_at ?? a?.sop_snapshot_json?.sop?.updated_at ?? null })).filter(a => String(a.status || '') === 'pending');
    markSectionLoaded('my-approvals');
    renderMyApprovals();
    return state.myApprovals;
  }catch(e){
    state.myApprovals = [];
    renderMyApprovals();
    if(errEl) errEl.textContent = t('approvalStatusUpdateFailed', { err: e?.message || String(e) });
    return [];
  }
}

  sel.innerHTML = `<option value="__ALL__">${escapeHtml(t('all'))}</option>` + names.map(n => `<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`).join('');

function renderAdminAllActions(){
  const tbody = document.getElementById('all-actions-table');
  if(!tbody) return;
  const filterVal = document.getElementById('all-actions-analysis-filter')?.value || '__ALL__';
  const statusVal = document.getElementById('all-actions-status-filter')?.value || '__ALL__';
  const sortVal = document.getElementById('all-actions-sort')?.value || 'analysis_name';
  let list = [...(state.allActions || [])];
  if(filterVal !== '__ALL__') list = list.filter(a => String(a.analysis_name || '') === filterVal);
  if(statusVal !== '__ALL__') list = list.filter(a => String(a.status || '') === statusVal);
  if(sortVal === 'analysis_name'){
    list.sort((a,b) => {
      const an = String(a.analysis_name || '').localeCompare(String(b.analysis_name || ''), undefined, { sensitivity:'base' });
      if(an !== 0) return an;
      return String(a.title || '').localeCompare(String(b.title || ''), undefined, { sensitivity:'base' });
    });
  } else if(sortVal === 'created_asc'){
    list.sort((a,b) => String(a.created_at || '').localeCompare(String(b.created_at || '')));
  } else {
    list.sort((a,b) => String(b.created_at || '').localeCompare(String(a.created_at || '')));
  }
  const rows = list.map((a)=>{
    const analysisText = String(a.analysis_name || a.analysis_id || '').trim() || t('notSpecified');
    return `
      <tr>
        <td>${escapeHtml(analysisText)}</td>
        <td>${escapeHtml(a.title || '')}</td>
        <td>${escapeHtml(displayNameFromId(a.owner || ''))}</td>
        <td>${escapeHtml(lv(a.priority || ''))}</td>
        <td><span class="pill ${statusClass(a.status || '')}">${escapeHtml(lv(a.status || ''))}</span></td>
        <td>${escapeHtml(a.deadline || t('notSpecified'))}</td>
        <td>${escapeHtml(String(a.saving ?? 0))} min</td>
        <td>${a.actual_saving!=null && a.actual_saving!=='' ? escapeHtml(String(a.actual_saving)) + ' min' : ''}</td>
        <td>${escapeHtml(a.note || '')}</td>
      </tr>`;
  }).join('');
  setHtmlIfChanged(tbody, rows || `<tr><td colspan="9" class="muted">${escapeHtml(t('allActionsEmpty'))}</td></tr>`);
}

state.profilesCache = state.profilesCache || { loaded:false, nameToId:{}, idToName:{}, list:[] };

async function ensureProfilesLoaded(forceReload=false){
  state.profilesCache = state.profilesCache || { loaded:false, nameToId:{}, lowerNameToId:{}, idToName:{}, list:[] };
  if(forceReload) state.profilesCache.loaded = false;
  if(state.profilesCache.loaded) return true;

  try{
    const res = await callApi('profiles.list', {});
    const rows = (res?.profiles || []).filter(r => r && r.display_name);

    rows.sort((a,b)=> String(a.display_name).localeCompare(String(b.display_name), undefined, { sensitivity:'base' }));

    const nameToId = {};
    const lowerNameToId = {};
    const idToName = {};

    rows.forEach(r=>{
      const dn = String(r.display_name).trim();
      if(!dn) return;
      nameToId[dn] = r.id;
      lowerNameToId[dn.toLowerCase()] = r.id;
      idToName[r.id] = dn;
    });

    state.profilesCache = { loaded:true, nameToId, lowerNameToId, idToName, list: rows };

    const dl = document.getElementById('owner-datalist');
    if(dl){
      dl.innerHTML = rows.map(r=>`<option value="${escapeHtml(String(r.display_name))}"></option>`).join('');
    }

    return true;
  }catch(e){
    console.warn('ensureProfilesLoaded failed', e);
    state.profilesCache.loaded = false;
    const sug = document.getElementById('owner-suggest');
    if(sug){
      sug.style.display='block';
      sug.innerHTML = '<div class="mutedline">Kunne ikke hente brugerliste: ' + escapeHtml(e?.message||String(e)) + '</div>';
    }
    return false;
  }
}

function bindOwnerAutocomplete(){
  const input = document.getElementById('action-owner');
  const hidden = document.getElementById('action-owner-id');
  const sug = document.getElementById('owner-suggest');
  if(!input || !hidden || !sug) return;

  const close = ()=>{ sug.style.display='none'; sug.innerHTML=''; };

  const pick = (name)=>{
    input.value = name;
    const id = state.profilesCache?.nameToId?.[name] || state.profilesCache?.lowerNameToId?.[String(name).toLowerCase()] || '';
    hidden.value = id;
    close();
  };

  const renderSug = ()=>{
    const q = (input.value || '').trim().toLowerCase();

    if(!state.profilesCache?.loaded){
      sug.style.display='block';
      sug.innerHTML = '<div class="mutedline">Henter display names...</div>';
      ensureProfilesLoaded().then(()=>renderSug());
      return;
    }

    const list = state.profilesCache.list || [];
    const matches = list
      .map(r=>String(r.display_name||'').trim())
      .filter(n=>n)
      .filter(n=> q==='' || n.toLowerCase().includes(q))
      .slice(0, 30);

    if(matches.length===0){
      sug.style.display='block';
      sug.innerHTML = '<div class="mutedline">Ingen match</div>';
      hidden.value = '';
      return;
    }

    sug.style.display='block';
    sug.innerHTML = matches.map(n=>'<button type="button">'+escapeHtml(n)+'</button>').join('');
    sug.querySelectorAll('button').forEach(btn=>{
      btn.addEventListener('mousedown', (ev)=>{ ev.preventDefault(); pick(btn.textContent); });
    });

    const exact = (input.value || '').trim();
    hidden.value = state.profilesCache?.nameToId?.[exact] || state.profilesCache?.lowerNameToId?.[exact.toLowerCase()] || '';
  };

  input.addEventListener('focus', renderSug);
  input.addEventListener('click', renderSug);
  input.addEventListener('input', debounce(renderSug, 180));
  input.addEventListener('keydown', (e)=>{ if(e.key==='Escape') close(); });

  document.addEventListener('click', (e)=>{
    if(e.target===input || sug.contains(e.target)) return;
    close();
  });
}

function getAISampleTimes(video, desiredCount=8){
  const duration = Number(video?.duration || 0);
  if(!Number.isFinite(duration) || duration <= 0) return [];
  const count = Math.max(4, Math.min(desiredCount, Math.floor(duration / 5) || desiredCount));
  const epsilon = Math.min(0.25, duration / 100);
  if(count === 1) return [Math.max(0, duration / 2)];
  const times = [];
  for(let i=0;i<count;i++){
    const ratio = count === 1 ? 0.5 : i / (count - 1);
    const t = Math.max(0, Math.min(duration - epsilon, ratio * duration));
    times.push(Number(t.toFixed(2)));
  }
  return [...new Set(times)];
}

function seekVideoForFrame(video, second){
  return new Promise((resolve, reject) => {
    if(!video) return reject(new Error('Videoelement mangler'));
    const duration = Number(video.duration || 0);
    const target = Math.max(0, Math.min(duration || 0, Number(second || 0)));
    let done = false;
    const clean = () => {
      video.removeEventListener('seeked', onSeeked);
      video.removeEventListener('error', onError);
    };
    const finish = () => {
      if(done) return;
      done = true;
      clean();
      resolve();
    };
    const fail = (err) => {
      if(done) return;
      done = true;
      clean();
      reject(err instanceof Error ? err : new Error(String(err || 'Video seek fejlede')));
    };
    const onSeeked = () => requestAnimationFrame(() => requestAnimationFrame(finish));
    const onError = () => fail(new Error('Kunne ikke læse frame fra video'));
    video.addEventListener('seeked', onSeeked, { once: true });
    video.addEventListener('error', onError, { once: true });
    try{
      if(Math.abs((video.currentTime || 0) - target) < 0.05){
        requestAnimationFrame(() => requestAnimationFrame(finish));
      } else {
        video.currentTime = target;
      }
    }catch(e){
      fail(e);
    }
    setTimeout(() => finish(), 1200);
  });
}

function captureCanvasFrameFromVideo(video, opts={}){
  const quality = Number(opts.quality || 0.72);
  const maxWidth = Number(opts.maxWidth || 960);
  const vw = Number(video.videoWidth || 0);
  const vh = Number(video.videoHeight || 0);
  if(!vw || !vh) throw new Error('Video metadata mangler');
  const ratio = vw > maxWidth ? maxWidth / vw : 1;
  const w = Math.max(1, Math.round(vw * ratio));
  const h = Math.max(1, Math.round(vh * ratio));
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  if(!ctx) throw new Error('Canvas kunne ikke initialiseres');
  ctx.drawImage(video, 0, 0, w, h);
  return canvas.toDataURL('image/jpeg', quality);
}

async function captureVideoFramesForAI(video, desiredCount=8){
  const times = getAISampleTimes(video, desiredCount);
  const frames = [];
  for(const second of times){
    await seekVideoForFrame(video, second);
    const image = captureCanvasFrameFromVideo(video, { quality: 0.72, maxWidth: 960 });
    frames.push({ second, image });
  }
  return frames;
}
function waitForVideoMetadata(video, timeoutMs=15000){
  return new Promise((resolve, reject) => {
    if(!video) return reject(new Error('Videoelement mangler'));
    if(Number.isFinite(video.duration) && video.duration > 0 && video.videoWidth){
      resolve(video);
      return;
    }
    let done = false;
    let timeout = null;
    const clean = () => {
      video.removeEventListener('loadedmetadata', onReady);
      video.removeEventListener('canplay', onReady);
      video.removeEventListener('error', onError);
      if(timeout) clearTimeout(timeout);
    };
    const finish = () => {
      if(done) return;
      done = true;
      clean();
      resolve(video);
    };
    const fail = (err) => {
      if(done) return;
      done = true;
      clean();
      reject(err instanceof Error ? err : new Error(String(err || 'Kunne ikke indlæse video til AI')));
    };
    const onReady = () => {
      if(Number.isFinite(video.duration) && video.duration > 0 && video.videoWidth){
        finish();
      }
    };
    const onError = () => fail(new Error('Kunne ikke indlæse baggrundsvideo til AI'));
    timeout = setTimeout(() => fail(new Error('Timeout ved indlæsning af baggrundsvideo til AI')), timeoutMs);
    video.addEventListener('loadedmetadata', onReady);
    video.addEventListener('canplay', onReady);
    video.addEventListener('error', onError, { once:true });
  });
}
async function createHiddenAIVideoFromCurrentSource(){
  const sourceVideo = document.getElementById('analysis-video');
  const src = sourceVideo?.currentSrc || sourceVideo?.src || '';
  if(!src) throw new Error('Ingen video er indlæst');
  const aiVideo = document.createElement('video');
  aiVideo.preload = 'auto';
  aiVideo.muted = true;
  aiVideo.playsInline = true;
  aiVideo.setAttribute('aria-hidden','true');
  aiVideo.tabIndex = -1;
  aiVideo.style.position = 'fixed';
  aiVideo.style.left = '-99999px';
  aiVideo.style.top = '0';
  aiVideo.style.width = '1px';
  aiVideo.style.height = '1px';
  aiVideo.style.opacity = '0';
  aiVideo.style.pointerEvents = 'none';
  aiVideo.src = src;
  document.body.appendChild(aiVideo);
  aiVideo.load();
  await waitForVideoMetadata(aiVideo);
  return aiVideo;
}
function destroyHiddenAIVideo(aiVideo){
  if(!aiVideo) return;
  try{ aiVideo.pause(); }catch(_e){}
  try{ aiVideo.removeAttribute('src'); aiVideo.load(); }catch(_e){}
  try{ aiVideo.remove(); }catch(_e){}
}

function buildExistingStepsForAI(){
  return Array.isArray(state?.steps)
    ? state.steps.map((s, i) => ({
        seq_no: i + 1,
        name: s?.name || '',
        start_sec: Number(s?.start || 0),
        end_sec: Number(s?.end || 0),
        duration_sec: Number(s?.duration || 0),
        smed_type: s?.smedType || '',
        activity_type: s?.activityType || '',
        waste_type: s?.wasteType || '',
        comment: s?.comment || ''
      }))
    : [];
}

        <div><strong>SMED-type:</strong> ${escapeHtml(s?.suggested_smed_type || 'Ikke oplyst')}</div>
        <div><strong>Aktivitetstype:</strong> ${escapeHtml(s?.suggested_activity_type || 'Ikke oplyst')}</div>
        <div><strong>Spildtype:</strong> ${escapeHtml(s?.suggested_waste_type || 'Ikke oplyst')}</div>

    html += '<h3 style="margin:0 0 10px 0">Foreslåede actions</h3>';
    html += '<div style="display:grid;gap:10px">';
    html += actions.map((a, i) => `
      <div style="border:1px solid #e5e7eb;border-radius:12px;padding:12px;background:#ffffff">
        <div style="font-weight:700;margin-bottom:6px">${i + 1}. ${escapeHtml(a?.title || 'Ikke oplyst')}</div>

async function approveAISuggestion(index){
  const list = Array.isArray(state?.aiPendingSuggestions) ? state.aiPendingSuggestions : [];
  const suggestion = list[index];
  if(!suggestion) return;
  applyAISuggestionsToSteps([suggestion]);
  list.splice(index,1);
  state.aiPendingSuggestions = list;
  saveCurrentState();
  try{ await syncStepsOnline(); }catch(e){ console.warn(e); }
  setVideoStatus(t('aiApprovedInserted'));
  render();
}
function rejectAISuggestion(index){
  const list = Array.isArray(state?.aiPendingSuggestions) ? state.aiPendingSuggestions : [];
  if(index < 0 || index >= list.length) return;
  list.splice(index,1);
  state.aiPendingSuggestions = list;
  saveCurrentState();
  setVideoStatus(t('aiRejectedRemoved'));
  render();
}
window.approveAISuggestion = approveAISuggestion;
window.rejectAISuggestion = rejectAISuggestion;
function applyAISuggestionsToSteps(sequenceSuggestions){
  if(!Array.isArray(sequenceSuggestions) || !sequenceSuggestions.length) return 0;

  const mapped = sequenceSuggestions.map((s, idx) => {
    const rawStart = Number(s?.start_sec ?? 0);
    const rawEnd = Number(s?.end_sec ?? rawStart);
    const start = Math.max(0, isFinite(rawStart) ? Math.round(rawStart) : 0);
    const end = Math.max(start, isFinite(rawEnd) ? Math.round(rawEnd) : start);
    const duration = Math.max(0, end - start);

    const commentParts = [
      'AI-forslag',
      s?.observation ? `Observation: ${s.observation}` : '',
      s?.assessment ? `Vurdering: ${s.assessment}` : '',
      s?.assumption ? `Antagelse: ${s.assumption}` : '',
      s?.requires_verification ? 'Kræver verifikation' : ''
    ].filter(Boolean);

    return {
      name: s?.activity || `AI trin ${idx + 1}`,
      start,
      end,
      duration,
      smedType: s?.suggested_smed_type || 'Intern',
      activityType: s?.suggested_activity_type || 'Forberedelse',
      wasteType: s?.suggested_waste_type || 'Ingen',
      comment: commentParts.join(' | ')
    };
  });

  state.steps.push(...mapped);
  return mapped.length;
}

async function runAISuggestions(){  
  const video = document.getElementById('analysis-video');  
  if(!video || !video.src){  
    await openInfoModal('Indlæs en video først, før du tester AI.', 'AI test');  
    return;  
  }  
  if(!Number.isFinite(video.duration) || video.duration <= 0 || !video.videoWidth){  
    await openInfoModal('Vent til videoen er indlæst helt, og prøv igen.', 'AI test');  
    return;  
  }  
  const aiBtn = document.querySelector('button[onclick="runAISuggestions()"]');  
  const previousBtnText = aiBtn?.textContent || '';  
  const previousTime = Number(video.currentTime || 0);  
  let aiVideo = null;  
  try{  
    if(aiBtn){  
      aiBtn.disabled = true;  
      aiBtn.textContent = 'AI analyserer video...';  
    }  
    setVideoStatus('AI analyserer i baggrunden...');
    aiVideo = await createHiddenAIVideoFromCurrentSource();
    const frames = await captureVideoFramesForAI(aiVideo, 8);  
    const observationBlocks = [  
      document.getElementById('video-observation')?.value || '',  
      document.getElementById('step-comment')?.value || ''  
    ].map(v => String(v || '').trim()).filter(Boolean);  
    const payload = {  
      factory: state?.analysis?.site || '',  
      line: state?.analysis?.line || '',  
      changeoverType: state?.analysis?.type || '',  
      fromProductFormat: state?.analysis?.product || '',  
      toProductFormat: '',  
      currentChangeoverTime: formatTime(Number(aiVideo.duration || video.duration || 0)),  
      transcript: '',  
      observation: observationBlocks.join(' | '),  
      knownProblems: '',  
      goal: '',  
      video_duration_sec: Number(aiVideo.duration || video.duration || 0),  
      current_video_time_sec: Number(previousTime || 0),  
      frames,  
      existing_steps: buildExistingStepsForAI(),  
      allowed_categories: {  
        smedTypes: state?.setup?.smedTypes || [],  
        activityTypes: state?.setup?.activityTypes || [],  
        wasteTypes: state?.setup?.wasteTypes || []  
      }  
    };  
    const data = await callApi('ai.smed_analyze', payload);  
    if(!data?.ok && !data?.result && !data?.text){  
      throw new Error(data?.error || 'Ingen gyldig respons fra AI');  
    }  
    const result = data?.result || data;  
    const suggestions = Array.isArray(result?.sequence_suggestions) ? result.sequence_suggestions : [];  
    if(!suggestions.length){  
      await openInfoModal('AI returnerede ingen SMED-trin.', 'AI forslag');  
      setVideoStatus('AI returnerede ingen SMED-trin.');
      return;  
    }  
    state.aiPendingSuggestions = suggestions;  
    saveCurrentState();  
    render();  
    await goToSection('live');  
    const actionCount = Array.isArray(result?.action_suggestions) ? result.action_suggestions.length : 0;  
    const statusMsg = actionCount > 0  
      ? `${t('aiSuggestionsReady')} ${t('aiActionSuggestionsNote', { count: actionCount })}`  
      : t('aiSuggestionsReady');  
    setVideoStatus(statusMsg);  
  }catch(e){  
    console.error('AI fejl:', e);  
    await openInfoModal('AI fejl: ' + (e?.message || String(e)), 'Fejl');  
    setVideoStatus('AI fejl: ' + (e?.message || String(e)), true);
  }finally{  
    destroyHiddenAIVideo(aiVideo);
    if(aiBtn){  
      aiBtn.disabled = false;  
      aiBtn.textContent = previousBtnText || 'AI forslag';  
    }  
  }  
}

        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px">
          <h2 id="ai-result-modal-title" style="margin:0;font-size:20px"></h2>
          <button onclick="document.getElementById('ai-result-modal').remove()" class="ghost">Luk</button>

}
